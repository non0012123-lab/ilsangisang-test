name: desktop

# 윈도우 설치파일(.exe) 빌드 — 이 저장소는 Cloudflare(웹)와 별개로 데스크톱 셸을 빌드한다.
#  • desktop 브랜치 push / 수동 실행 → 빌드만(설치파일을 아티팩트로 업로드, 컴파일 검증용)
#  • app-v* 태그 push → GitHub Release 초안 생성 + 자동 업데이트용 latest.json 발행
on:
  workflow_dispatch:
  push:
    branches: [desktop]
    tags: ['app-v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build desktop app (and release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 태그일 때만 릴리스 생성, 브랜치 push 면 빌드만
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: '일상이상 데스크톱 ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

      - name: Upload installer (빌드 검증용 아티팩트)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ilsangisang-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: warn
